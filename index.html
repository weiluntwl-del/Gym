<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gym Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222222;
    --surface3: #2a2a2a;
    --border: #333333;
    --border2: #444444;
    --text: #f0f0f0;
    --muted: #888888;
    --accent: #e8ff47;
    --accent-dim: rgba(232,255,71,0.12);
    --accent-border: rgba(232,255,71,0.3);
    --red: #ff5050;
    --orange: #ff9940;
    --blue: #5b9cf6;
    --green: #4ade80;
    --purple: #c084fc;
    --teal: #2dd4bf;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== LANDING ===== */
  #landing {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 2rem 2rem 4rem;
    position: relative;
    transition: opacity 0.25s ease, transform 0.25s ease;
  }

  #landing.page-exit {
    opacity: 0;
    transform: translateY(-12px);
    pointer-events: none;
  }

  .landing-bg {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(232,255,71,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .landing-header {
    text-align: center;
    margin-bottom: 2rem;
    margin-top: 2rem;
  }

  .landing-header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(64px, 12vw, 120px);
    letter-spacing: 4px;
    line-height: 0.9;
    color: var(--text);
  }

  .landing-header h1 span {
    color: var(--accent);
  }

  .landing-header p {
    margin-top: 0.75rem;
    font-size: 14px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .day-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1rem;
    width: 100%;
    max-width: 560px;
  }

  .day-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  .day-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 16px 16px 0 0;
  }

  .day-card.push::before { background: var(--red); }
  .day-card.pull::before { background: var(--blue); }
  .day-card.legs::before { background: var(--green); }
  .day-card.shoulders::before { background: var(--purple); }

  .day-card:hover {
    border-color: var(--border2);
    background: var(--surface2);
    transform: translateY(-2px);
  }

  .day-card .day-icon {
    font-size: 28px;
    margin-bottom: 0.75rem;
  }

  .day-card h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 1px;
    margin-bottom: 0.25rem;
  }

  .day-card .day-sub {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.4;
  }



  /* ===== WORKOUT PAGE ===== */
  #workout-page {
    display: none;
    min-height: 100vh;
    flex-direction: column;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.25s ease, transform 0.25s ease;
  }

  #workout-page.page-enter {
    opacity: 1;
    transform: translateY(0);
  }

  .workout-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 1rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .back-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 6px 12px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .back-btn:hover { background: var(--surface2); }

  .workout-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
  }

  .day-stripe {
    width: 4px;
    height: 28px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .workout-body {
    padding: 1.25rem;
    max-width: 700px;
    margin: 0 auto;
    width: 100%;
  }

  /* Section labels */
  .section-label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin: 1.5rem 0 0.75rem;
    padding-left: 2px;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    user-select: none;
  }

  .section-label .section-toggle {
    font-size: 9px;
    opacity: 0.5;
    transition: transform 0.2s;
    margin-left: 2px;
  }

  .section-label.collapsed .section-toggle { transform: rotate(-90deg); }

  .section-body {
    overflow: hidden;
    transition: opacity 0.2s;
  }

  .section-body.collapsed { display: none; }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ===== COMPACT MODE ===== */
  .view-toggle {
    margin-left: auto;
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-size: 13px;
    padding: 5px 10px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
  }
  .view-toggle:hover { border-color: var(--border2); color: var(--text); }
  .view-toggle.active { border-color: var(--accent); color: var(--accent); }

  /* Compact card overrides */
  .workout-body.compact .ex-tags { display: none; }
  .workout-body.compact .ex-card { border-radius: 8px; margin-bottom: 4px; }
  .workout-body.compact .ex-row { padding: 6px 10px; }
  .workout-body.compact .ex-name { font-size: 13px; }
  .workout-body.compact .weight-display { font-size: 12px; }
  .workout-body.compact .bookmark-btn { font-size: 15px; }
  .workout-body.compact .reorder-btns { display: none; }
  .workout-body.compact .ex-detail { display: none !important; }

  /* ===== EXERCISE CARD ===== */
  /* Exercise card */
  .ex-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.15s;
  }

  .ex-card:hover { border-color: var(--border2); }

  .ex-card.bookmarked {
    border-color: rgba(232,255,71,0.2);
    background: var(--surface);
  }

  .ex-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0.75rem 1rem;
    cursor: pointer;
  }

  .bookmark-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 18px;
    padding: 2px;
    transition: color 0.15s;
    flex-shrink: 0;
    line-height: 1;
  }

  .ex-card.bookmarked .bookmark-btn { color: var(--accent); }
  .bookmark-btn:hover { color: var(--accent); }

  .ex-name-block {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 0;
  }

  .ex-name {
    font-size: 14px;
    font-weight: 500;
    text-transform: capitalize;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .ex-tags {
    display: flex;
    align-items: center;
    gap: 5px;
    flex-wrap: wrap;
  }

  .target-empty {
    color: #555 !important;
    border-color: #333 !important;
    background: transparent !important;
  }

  .muscle-tag {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 500;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }

  .weight-inline {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(232,255,71,0.3);
    border-radius: 0;
    font-family: 'DM Sans', sans-serif;
    width: 72px;
    text-align: right;
    padding: 2px 4px;
    flex-shrink: 0;
    transition: border-color 0.15s, background 0.15s;
  }

  .weight-inline:focus {
    outline: none;
    border-bottom-color: var(--accent);
    background: rgba(232,255,71,0.06);
    border-radius: 4px 4px 0 0;
  }

  .ex-card-wrapper {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .reorder-btns {
    display: flex;
    flex-direction: column;
    gap: 1px;
    flex-shrink: 0;
  }

  .reorder-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 9px;
    line-height: 1;
    padding: 2px 4px;
    cursor: pointer;
    transition: color 0.15s;
  }

  .reorder-btn:hover { color: var(--text); }





  /* Expanded panel */
  .ex-detail {
    display: none;
    border-top: 1px solid var(--border);
    padding: 1rem;
    background: var(--surface2);
    gap: 1rem;
    flex-direction: column;
  }

  .ex-card.expanded .ex-detail { display: flex; }

  .detail-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .detail-label {
    font-size: 12px;
    color: var(--muted);
    min-width: 80px;
  }

  .detail-input {
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 5px 10px;
    width: 140px;
    transition: border-color 0.15s;
  }

  .detail-input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .muscle-select {
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 5px 10px;
    width: 180px;
    transition: border-color 0.15s;
  }

  .muscle-select:focus {
    outline: none;
    border-color: var(--accent);
  }

  .save-btn {
    background: var(--accent);
    color: #0f0f0f;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 5px 14px;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .save-btn:hover { opacity: 0.85; }

  /* Muscle tag colors */
  /* Card border by muscle group */
  .ex-card.muscle-chest    { border-color: rgba(255,80,80,0.35); }
  .ex-card.muscle-triceps  { border-color: rgba(255,100,180,0.35); }
  .ex-card.muscle-back     { border-color: rgba(91,156,246,0.35); }
  .ex-card.muscle-biceps   { border-color: rgba(45,212,191,0.35); }
  .ex-card.muscle-shoulders{ border-color: rgba(192,132,252,0.35); }
  .ex-card.muscle-legs     { border-color: rgba(74,222,128,0.35); }
  .ex-card.muscle-core     { border-color: rgba(232,255,71,0.35); }
  .ex-card.muscle-calves   { border-color: rgba(74,222,128,0.3); }

  .tag-chest { background: rgba(255,80,80,0.15); color: var(--red); }
  .tag-triceps { background: rgba(255,100,180,0.15); color: #ff64b4; }
  .tag-back { background: rgba(91,156,246,0.15); color: var(--blue); }
  .tag-biceps { background: rgba(45,212,191,0.15); color: var(--teal); }
  .tag-shoulders { background: rgba(192,132,252,0.15); color: var(--purple); }
  .tag-rear-delts { background: rgba(192,132,252,0.12); color: #a855f7; }
  .tag-mid-delts { background: rgba(255,153,64,0.12); color: #fb923c; }
  .tag-legs { background: rgba(74,222,128,0.15); color: var(--green); }
  .tag-core { background: rgba(232,255,71,0.15); color: var(--accent); }
  .tag-calves { background: rgba(74,222,128,0.12); color: #16a34a; }

  .target-tag {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 20px;
    font-weight: 500;
    letter-spacing: 0.3px;
    flex-shrink: 0;
    background: rgba(255,255,255,0.06);
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .copy-day-btn {
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    padding: 3px 10px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .copy-day-btn:hover { border-color: var(--accent); color: var(--accent); }

  .delete-btn {
    background: none;
    border: 1px solid rgba(255,80,80,0.3);
    border-radius: 8px;
    color: var(--red);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 5px 14px;
    cursor: pointer;
    margin-left: auto;
    transition: background 0.15s, border-color 0.15s;
  }
  .delete-btn:hover { background: rgba(255,80,80,0.1); border-color: var(--red); }

  /* ===== EXPORT/IMPORT ===== */
  .data-corner {
    position: absolute;
    top: 1.25rem;
    right: 1.25rem;
    z-index: 10;
  }

  .data-icon-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-size: 16px;
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
  }

  .data-icon-btn:hover { border-color: var(--border2); color: var(--text); background: var(--surface); }

  .data-dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    min-width: 140px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  }

  .data-corner.open .data-dropdown { display: block; }

  .data-dropdown button {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    background: none;
    border: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 10px 14px;
    cursor: pointer;
    transition: background 0.12s;
    text-align: left;
  }

  .data-dropdown button:hover { background: var(--surface2); }
  .data-dropdown button + button { border-top: 1px solid var(--border); }

  /* ===== GLOSSARY ===== */
  .glossary-wrap {
    width: 100%;
    max-width: 560px;
    margin-top: 2rem;
  }

  .glossary-toggle {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 0.75rem 1.1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: border-color 0.15s, background 0.15s;
    letter-spacing: 0.5px;
  }

  .glossary-toggle:hover { background: var(--surface2); border-color: var(--border2); }
  .glossary-toggle .gtoggle-icon { font-size: 11px; color: var(--muted); transition: transform 0.2s; }
  .glossary-toggle.open .gtoggle-icon { transform: rotate(180deg); }

  .glossary-panel {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 12px 12px;
    overflow: hidden;
  }

  .glossary-panel.open { display: block; }

  .glossary-search {
    padding: 0.75rem 1rem 0;
  }

  .glossary-search input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 7px 12px;
    transition: border-color 0.15s;
  }

  .glossary-search input:focus { outline: none; border-color: var(--accent); }
  .glossary-search input::placeholder { color: var(--muted); }

  .glossary-filters {
    display: flex;
    gap: 6px;
    padding: 0.75rem 1rem 0;
    flex-wrap: wrap;
  }

  .gfilter-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    padding: 3px 10px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.3px;
  }

  .gfilter-btn:hover { border-color: var(--border2); color: var(--text); }
  .gfilter-btn.active { background: var(--accent); border-color: var(--accent); color: #0f0f0f; }

  .glossary-list {
    padding: 0.5rem 0.75rem;
    max-height: 420px;
    overflow-y: auto;
  }

  .glossary-list::-webkit-scrollbar { width: 4px; }
  .glossary-list::-webkit-scrollbar-track { background: transparent; }
  .glossary-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .g-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 4px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    border-radius: 6px;
    transition: background 0.12s;
  }

  .g-row:last-child { border-bottom: none; }
  .g-row:hover { background: var(--surface2); }

  .g-name {
    font-size: 13px;
    font-weight: 500;
    flex: 1;
    text-transform: capitalize;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .g-day-badges {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }

  .g-day-badge {
    font-size: 9px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 10px;
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }

  .gbadge-push  { background: rgba(255,80,80,0.15); color: #ff5050; }
  .gbadge-pull  { background: rgba(91,156,246,0.15); color: #5b9cf6; }
  .gbadge-legs  { background: rgba(74,222,128,0.15); color: #4ade80; }
  .gbadge-shoulders { background: rgba(192,132,252,0.15); color: #c084fc; }

  .g-edit-panel {
    display: none;
    background: var(--surface2);
    border-top: 1px solid var(--border);
    padding: 0.75rem 1rem;
    flex-direction: column;
    gap: 8px;
  }

  .g-row.gexpanded + .g-edit-panel { display: flex; }

  .g-detail-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .g-label { font-size: 12px; color: var(--muted); min-width: 56px; }

  .g-input {
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 4px 8px;
    transition: border-color 0.15s;
  }
  .g-input:focus { outline: none; border-color: var(--accent); }

  .g-select {
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 4px 8px;
    transition: border-color 0.15s;
  }
  .g-select:focus { outline: none; border-color: var(--accent); }

  .g-day-checks {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  .g-day-check {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
  }

  .g-day-check input { accent-color: var(--accent); cursor: pointer; }

  .g-actions {
    display: flex;
    gap: 8px;
    margin-top: 2px;
  }

  .g-save-btn {
    background: var(--accent);
    color: #0f0f0f;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 5px 14px;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .g-save-btn:hover { opacity: 0.85; }

  .g-del-btn {
    background: none;
    border: 1px solid rgba(255,80,80,0.3);
    border-radius: 8px;
    color: var(--red);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 5px 14px;
    cursor: pointer;
    margin-left: auto;
    transition: background 0.15s;
  }
  .g-del-btn:hover { background: rgba(255,80,80,0.1); }

  .glossary-add {
    padding: 0.75rem 1rem;

function loadData() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) return JSON.parse(JSON.stringify(DEFAULT_DATA));
    const data = JSON.parse(saved);
    // Migration: patch target and muscle from DEFAULT_DATA
    for (const day of Object.keys(DEFAULT_DATA)) {
      for (const def of DEFAULT_DATA[day]) {
        const live = (data[day] || []).find(e => e.id === def.id);
        if (live) {
          if ((live.target === null || live.target === undefined) && def.target) live.target = def.target;
          if (def.muscle) live.muscle = def.muscle;
          // Migrate calves -> legs
          if (live.muscle === 'calves') { live.muscle = 'legs'; if (!live.target) live.target = 'calves'; }
          // Migrate facepull muscle -> back
          if (live.id === 'pu8') live.muscle = 'back';
        }
      }
    }
    return data;
  } catch(e) { return JSON.parse(JSON.stringify(DEFAULT_DATA)); }
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(gymData));
}

let gymData = loadData();
let currentDay = null;

function updateCounts() {}

updateCounts();

function bordClass(muscle) {
  return 'muscle-' + (muscle || 'core').replace(' ', '-');
}

function tagClass(muscle) {
  const map = {
    'chest': 'tag-chest', 'triceps': 'tag-triceps', 'back': 'tag-back',
    'biceps': 'tag-biceps', 'shoulders': 'tag-shoulders',
    'legs': 'tag-legs', 'core': 'tag-core'
  };
  return map[muscle] || 'tag-core';
}

function renderExercise(ex, dayKey) {
  const wrapper = document.createElement('div');
  wrapper.className = 'ex-card-wrapper';
  wrapper.id = 'wrap-' + ex.id;

  const card = document.createElement('div');
  card.className = 'ex-card ' + bordClass(ex.muscle) + (ex.bookmarked ? ' bookmarked' : '');
  card.id = 'card-' + ex.id;
  card.style.flex = '1';
  card.style.minWidth = '0';

  card.innerHTML = `
    <div class="ex-row" onclick="toggleExpand('${ex.id}','${dayKey}')">
      <button class="bookmark-btn" onclick="toggleBookmark(event,'${ex.id}','${dayKey}')" title="Bookmark">
        ${ex.bookmarked ? '★' : '☆'}
      </button>
      <div class="ex-name-block">
        <span class="ex-name">${ex.name}</span>
        <div class="ex-tags">
          <span class="muscle-tag ${tagClass(ex.muscle)}">${ex.muscle}</span>
          ${ex.target ? `<span class="target-tag" id="tt-${ex.id}">${ex.target}</span>` : `<span class="target-tag target-empty" id="tt-${ex.id}">—</span>`}
        </div>
      </div>
      <span class="weight-display" id="wd-${ex.id}">${ex.weight}</span>
      <div class="reorder-btns" onclick="event.stopPropagation()">
        <button class="reorder-btn" onclick="moveExercise(event,'${ex.id}','${dayKey}',-1)" title="Move up">▲</button>
        <button class="reorder-btn" onclick="moveExercise(event,'${ex.id}','${dayKey}',1)" title="Move down">▼</button>
      </div>
    </div>
    <div class="ex-detail" id="detail-${ex.id}">
      <div class="detail-row">
        <span class="detail-label">Name</span>
        <input class="detail-input" id="ni-${ex.id}" type="text" value="${ex.name}" placeholder="Exercise name" style="width:220px">
      </div>
      <div class="detail-row">
        <span class="detail-label">Weight</span>
        <input class="detail-input" id="wi-${ex.id}" type="text" value="${ex.weight.replace(/kg/gi,'').trim()}" placeholder="25" style="width:110px"><span style="font-size:13px;color:var(--muted);margin-left:4px">kg</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Muscle</span>
        <select class="muscle-select" id="mi-${ex.id}">
          ${MUSCLE_OPTIONS.map(m => `<option value="${m}" ${m===ex.muscle?'selected':''}>${m}</option>`).join('')}
        </select>
      </div>
      <div class="detail-row">
        <span class="detail-label">Target</span>
        <input class="detail-input" id="ti-${ex.id}" type="text" value="${ex.target || ''}" placeholder="e.g. upper chest" style="width:180px">
      </div>
      <div class="detail-row">
        <span class="detail-label">Copy to</span>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${Object.keys(DAYS).filter(d => d !== '${dayKey}').map(d =>
            `<button class="copy-day-btn" onclick="duplicateExercise(event,'${ex.id}','${dayKey}','`+d+`')">${DAYS[d].label}</button>`
          ).join('')}
        </div>
      </div>
      <div class="detail-row" style="justify-content:space-between">
        <button class="save-btn" onclick="saveExercise('${ex.id}','${dayKey}')">Save changes</button>
        <button class="delete-btn" onclick="deleteExercise(event,'${ex.id}','${dayKey}')">Delete</button>
      </div>
    </div>
  `;
  wrapper.appendChild(card);

  return wrapper;
}

function toggleExpand(id, dayKey) {
  const card = document.getElementById('card-' + id);
  card.classList.toggle('expanded');
}

function toggleBookmark(e, id, dayKey) {
  e.stopPropagation();
  const arr = gymData[dayKey];
  const idx = arr.findIndex(x => x.id === id);
  const ex = arr[idx];
  ex.bookmarked = !ex.bookmarked;

  if (ex.bookmarked) {
    // Move to end of bookmarked group (last bookmarked position)
    arr.splice(idx, 1);
    const lastBookmarked = arr.reduce((last, e, i) => e.bookmarked ? i : last, -1);
    arr.splice(lastBookmarked + 1, 0, ex);
  }

  saveData();
  openDay(dayKey);
  updateCounts();
}

function saveExercise(id, dayKey) {
  const ex = gymData[dayKey].find(x => x.id === id);
  const oldName  = ex.name;
  const rawName  = document.getElementById('ni-'+id).value.trim();
  const newName  = rawName || oldName;
  const rawW     = document.getElementById('wi-'+id).value.trim();
  const newWeight = rawW ? rawW.replace(/kg$/i,'').trim() + 'kg' : ex.weight;
  const newMuscle = document.getElementById('mi-'+id).value;
  const rawTarget = document.getElementById('ti-'+id).value.trim();
  const newTarget = rawTarget || null;

  // Sync changes to ALL exercises with the same name across every day
  for (const day of Object.keys(gymData)) {
    for (const e of gymData[day]) {
      if (e.name.toLowerCase() === oldName.toLowerCase()) {
        e.name   = newName;
        e.weight = newWeight;
        e.muscle = newMuscle;
        e.target = newTarget;
      }
    }
  }

  saveData();

  // Update the current card UI
  const card = document.getElementById('card-'+id);
  document.getElementById('wd-'+id).textContent = newWeight;
  const nameEl = card.querySelector('.ex-name');
  if (nameEl) nameEl.textContent = newName;
  const tag = card.querySelector('.muscle-tag');
  tag.className = 'muscle-tag ' + tagClass(newMuscle);
  tag.textContent = newMuscle;
  card.className = 'ex-card ' + bordClass(newMuscle) + (ex.bookmarked ? ' bookmarked' : '');
  const ttEl = document.getElementById('tt-'+id);
  if (ttEl) {
    ttEl.textContent = newTarget || '—';
    ttEl.className = 'target-tag' + (newTarget ? '' : ' target-empty');
  }
  card.classList.remove('expanded');
  showToast('Saved ✓');
  updateCounts();
}

function moveExercise(e, id, dayKey, dir) {
  e.stopPropagation();
  const arr = gymData[dayKey];
  const idx = arr.findIndex(x => x.id === id);
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= arr.length) return;
  if (arr[idx].bookmarked !== arr[newIdx].bookmarked) return;
  [arr[idx], arr[newIdx]] = [arr[newIdx], arr[idx]];
  saveData();
  openDay(dayKey);
}

function deleteExercise(e, id, dayKey) {
  e.stopPropagation();
  gymData[dayKey] = gymData[dayKey].filter(x => x.id !== id);
  saveData();
  const wrap = document.getElementById('wrap-' + id);
  if (wrap) {
    wrap.style.transition = 'opacity 0.2s, transform 0.2s';
    wrap.style.opacity = '0';
    wrap.style.transform = 'translateX(12px)';
    setTimeout(() => { wrap.remove(); updateCounts(); }, 200);
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function openDay(dayKey) {
  currentDay = dayKey;
  const day = DAYS[dayKey];
  const landing = document.getElementById('landing');
  const wp = document.getElementById('workout-page');
  landing.classList.add('page-exit');
  setTimeout(() => {
    landing.style.display = 'none';
    landing.classList.remove('page-exit');
    wp.style.display = 'flex';
    requestAnimationFrame(() => requestAnimationFrame(() => wp.classList.add('page-enter')));
  }, 220);

  document.getElementById('workout-title').textContent = day.label;
  document.getElementById('header-stripe').style.background = day.color;

  const body = document.getElementById('workout-body');
  body.innerHTML = '';

  const bookmarked = gymData[dayKey].filter(e => e.bookmarked);
  const rest = gymData[dayKey].filter(e => !e.bookmarked).sort(byMuscleAlpha);

  function makeSection(labelText, exercises, collapsible) {
    const lbl = document.createElement('div');
    lbl.className = 'section-label';
    const stateKey = dayKey + '-' + labelText;
    const isCollapsed = collapsible && sessionStorage.getItem(stateKey) !== '0';
    if (isCollapsed) lbl.classList.add('collapsed');
    lbl.innerHTML = labelText + (collapsible ? ' <span class="section-toggle">▼</span>' : '');

    const sectionBody = document.createElement('div');
    sectionBody.className = 'section-body' + (isCollapsed ? ' collapsed' : '');
    exercises.forEach(ex => sectionBody.appendChild(renderExercise(ex, dayKey)));

    if (collapsible) {
      lbl.addEventListener('click', () => {
        const nowCollapsed = !sectionBody.classList.contains('collapsed');
        sectionBody.classList.toggle('collapsed', nowCollapsed);
        lbl.classList.toggle('collapsed', nowCollapsed);
        sessionStorage.setItem(stateKey, nowCollapsed ? '1' : '0');
      });
    }

    body.appendChild(lbl);
    body.appendChild(sectionBody);
  }

  if (bookmarked.length) makeSection('★ Bookmarked', bookmarked, false);
  if (rest.length) makeSection('All exercises', rest, true);

  // Add exercise button + inline form
  const addWrap = document.createElement('div');
  addWrap.className = 'day-add-wrap';

  const addBtn = document.createElement('button');
  addBtn.className = 'day-add-btn';
  addBtn.id = 'day-add-btn-' + dayKey;
  addBtn.textContent = '+ Add exercise';
  addBtn.onclick = () => toggleDayAddForm(dayKey);

  const addForm = document.createElement('div');
  addForm.className = 'day-add-form';
  addForm.id = 'day-add-form-' + dayKey;
  addForm.innerHTML = `
    <div class="g-detail-row">
      <span class="g-label">Name</span>
      <input class="g-input" id="day-add-name-${dayKey}" type="text" placeholder="Exercise name" style="width:190px">
    </div>
    <div class="g-detail-row">
      <span class="g-label">Weight</span>
      <input class="g-input" id="day-add-weight-${dayKey}" type="text" placeholder="25" style="width:80px">
      <span style="font-size:12px;color:var(--muted)">kg</span>
    </div>
    <div class="g-detail-row">
      <span class="g-label">Muscle</span>
      <select class="g-select" id="day-add-muscle-${dayKey}">
        ${MUSCLE_OPTIONS.map(m => `<option value="${m}">${m}</option>`).join('')}
      </select>
    </div>
    <div class="g-detail-row">
      <span class="g-label">Target</span>
      <input class="g-input" id="day-add-target-${dayKey}" type="text" placeholder="e.g. upper chest" style="width:190px">
    </div>
    <div class="g-actions">
      <button class="g-save-btn" onclick="submitDayAdd('${dayKey}')">Add</button>
      <button class="g-del-btn" style="margin-left:0" onclick="toggleDayAddForm('${dayKey}')">Cancel</button>
    </div>
  `;

  addWrap.appendChild(addBtn);
  addWrap.appendChild(addForm);
  body.appendChild(addWrap);

  const spacer = document.createElement('div');
  spacer.style.height = '3rem';
  body.appendChild(spacer);
}


// ===== GLOSSARY =====
let glossaryFilter = 'all';
let glossaryOpen = false;

function toggleGlossary() {
  glossaryOpen = !glossaryOpen;
  document.getElementById('glossary-panel').classList.toggle('open', glossaryOpen);
  document.getElementById('glossary-toggle').classList.toggle('open', glossaryOpen);
  if (glossaryOpen) renderGlossary();
}

const byMuscleAlpha = (a,b) => a.muscle.localeCompare(b.muscle) || a.name.localeCompare(b.name);

function getAllExercises() {
  const all = [];
  for (const day of Object.keys(gymData)) {
    for (const ex of gymData[day]) {
      // Deduplicate by name (case-insensitive) — same exercise can have different ids across days
      const existing = all.find(e => e.name.toLowerCase() === ex.name.toLowerCase());
      if (existing) {
        if (!existing.days.includes(day)) existing.days.push(day);
        // Also track all ids for this exercise
        if (!existing.ids) existing.ids = [existing.id];
        if (!existing.ids.includes(ex.id)) existing.ids.push(ex.id);
      } else {
        all.push({ ...ex, days: [day], ids: [ex.id] });
      }
    }
  }
  return all.sort(byMuscleAlpha);
}

function renderGlossary() {
  const allEx = getAllExercises();
  const filters = document.getElementById('glossary-filters');
  const list = document.getElementById('glossary-list');

  // Render filter pills by muscle
  const muscleFilters = ['all', ...MUSCLE_OPTIONS];
  filters.innerHTML = muscleFilters.map(m =>
    `<button class="gfilter-btn ${glossaryFilter===m?'active':''}" onclick="setGlossaryFilter('${m}')">${m === 'all' ? 'All' : m}</button>`
  ).join('');

  // Filter by muscle + search
  const searchEl = document.getElementById('glossary-search');
  const query = searchEl ? searchEl.value.trim().toLowerCase() : '';
  const filtered = allEx.filter(e => {
    const muscleMatch = glossaryFilter === 'all' || e.muscle === glossaryFilter;
    const searchMatch = !query || e.name.toLowerCase().includes(query) || (e.target || '').toLowerCase().includes(query) || e.muscle.toLowerCase().includes(query);
    return muscleMatch && searchMatch;
  });

  // Render rows
  list.innerHTML = '';
  if (!filtered.length) {
    list.innerHTML = '<p style="padding:1rem;font-size:13px;color:var(--muted)">No exercises found.</p>';
    return;
  }

  filtered.forEach(ex => {
    const rowWrap = document.createElement('div');

    const row = document.createElement('div');
    row.className = 'g-row';
    row.id = 'grow-' + ex.id;
    row.innerHTML = `
      <span class="muscle-tag ${tagClass(ex.muscle)}" style="font-size:10px;padding:2px 7px">${ex.muscle}</span>
      <span class="g-name">${ex.name}</span>
      <div class="g-day-badges">${ex.days.map(d => `<span class="g-day-badge gbadge-${d}">${d}</span>`).join('')}</div>
    `;
    row.onclick = () => toggleGlossaryEdit(ex.id, ex.days);

    const editPanel = document.createElement('div');
    editPanel.className = 'g-edit-panel';
    editPanel.id = 'gedit-' + ex.id;
    editPanel.innerHTML = `
      <div class="g-detail-row">
        <span class="g-label">Name</span>
        <input class="g-input" id="gn-${ex.id}" type="text" value="${ex.name}" style="width:190px">
      </div>
      <div class="g-detail-row">
        <span class="g-label">Weight</span>
        <input class="g-input" id="gw-${ex.id}" type="text" value="${ex.weight.replace(/kg/gi,'').trim()}" style="width:80px">
        <span style="font-size:12px;color:var(--muted)">kg</span>
      </div>
      <div class="g-detail-row">
        <span class="g-label">Muscle</span>
        <select class="g-select" id="gm-${ex.id}">
          ${MUSCLE_OPTIONS.map(m => `<option value="${m}" ${m===ex.muscle?'selected':''}>${m}</option>`).join('')}
        </select>
      </div>
      <div class="g-detail-row">
        <span class="g-label">Target</span>
        <input class="g-input" id="gt-${ex.id}" type="text" value="${ex.target||''}" placeholder="e.g. upper chest" style="width:190px">
      </div>
      <div class="g-detail-row">
        <span class="g-label">Days</span>
        <div class="g-day-checks">
          ${Object.keys(DAYS).map(d => `
            <label class="g-day-check">
              <input type="checkbox" id="gd-${ex.id}-${d}" ${ex.days.includes(d)?'checked':''}>
              ${DAYS[d].label}
            </label>`).join('')}
        </div>
      </div>
      <div class="g-actions" data-ids='${JSON.stringify(ex.ids||[ex.id])}'>
        <button class="g-save-btn" onclick="saveGlossaryEdit('${ex.id}',this.closest('.g-actions'))">Save</button>
        <button class="g-del-btn" onclick="deleteGlossaryEx('${ex.id}',this.closest('.g-actions'))">Delete</button>
      </div>
    `;

    rowWrap.appendChild(row);
    rowWrap.appendChild(editPanel);
    list.appendChild(rowWrap);
  });
}

function toggleGlossaryEdit(id) {
  const row = document.getElementById('grow-' + id);
  const panel = document.getElementById('gedit-' + id);
  const isOpen = panel.style.display === 'flex';
  // close all
  document.querySelectorAll('.g-edit-panel').forEach(p => p.style.display = 'none');
  document.querySelectorAll('.g-row').forEach(r => r.classList.remove('gexpanded'));
  if (!isOpen) {
    panel.style.display = 'flex';
    row.classList.add('gexpanded');
  }
}

function saveGlossaryEdit(id, actionsEl) {
  const ids     = actionsEl ? JSON.parse(actionsEl.dataset.ids) : [id];
  const newName   = document.getElementById('gn-'+id).value.trim();
  const newWeight = document.getElementById('gw-'+id).value.trim();
  const newMuscle = document.getElementById('gm-'+id).value;
  const newTarget = document.getElementById('gt-'+id).value.trim() || null;
  const newDays   = Object.keys(DAYS).filter(d => document.getElementById('gd-'+id+'-'+d).checked);

  for (const day of Object.keys(gymData)) {
    // Find any entry belonging to this exercise (any of its ids)
    const idx = gymData[day].findIndex(e => ids.includes(e.id));
    if (idx !== -1) {
      if (!newDays.includes(day)) {
        gymData[day].splice(idx, 1);
      } else {
        const ex = gymData[day][idx];
        if (newName)   ex.name   = newName;
        if (newWeight) ex.weight = newWeight.replace(/kg$/i,'').trim() + 'kg';
        ex.muscle = newMuscle;
        ex.target = newTarget;
      }
    } else if (newDays.includes(day)) {
      const source = Object.values(gymData).flat().find(e => ids.includes(e.id));
      if (source) {
        const clone = { ...source };
        if (newName)   clone.name   = newName;
        if (newWeight) clone.weight = newWeight.replace(/kg$/i,'').trim() + 'kg';
        clone.muscle = newMuscle;
        clone.target = newTarget;
        gymData[day].push(clone);
      }
    }
  }

  saveData();
  // If a workout day is currently open, refresh it so cards reflect changes
  if (currentDay) openDay(currentDay);
  showToast('Saved ✓');
  renderGlossary();
  updateCounts();
}

function deleteGlossaryEx(id, actionsEl) {
  const ids = actionsEl ? JSON.parse(actionsEl.dataset.ids) : [id];
  for (const day of Object.keys(gymData)) {
    gymData[day] = gymData[day].filter(e => !ids.includes(e.id));
  }
  saveData();
  showToast('Deleted');
  renderGlossary();
  updateCounts();
}

function setGlossaryFilter(key) {
  glossaryFilter = key;
  renderGlossary();
}

function showAddForm() {
  const form = document.getElementById('add-ex-form');
  const btn  = document.getElementById('add-ex-btn');
  form.classList.add('open');
  btn.style.display = 'none';

  // Populate muscle select
  const ms = document.getElementById('add-muscle');
  ms.innerHTML = MUSCLE_OPTIONS.map(m => `<option value="${m}">${m}</option>`).join('');

  // Populate day checkboxes
  const dc = document.getElementById('add-day-checks');
  dc.innerHTML = Object.keys(DAYS).map(d =>
    `<label class="g-day-check"><input type="checkbox" id="add-day-${d}"> ${DAYS[d].label}</label>`
  ).join('');
}

function cancelAddForm() {
  document.getElementById('add-ex-form').classList.remove('open');
  document.getElementById('add-ex-btn').style.display = '';
}

function addExercise() {
  const name   = document.getElementById('add-name').value.trim();
  const weight = document.getElementById('add-weight').value.trim();
  const muscle = document.getElementById('add-muscle').value;
  const target = document.getElementById('add-target').value.trim() || null;
  const days   = Object.keys(DAYS).filter(d => document.getElementById('add-day-'+d).checked);

  if (!name) { showToast('Enter a name'); return; }
  if (!days.length) { showToast('Pick at least one day'); return; }

  const id = 'u' + Date.now();
  const ex = {
    id, name,
    weight: weight ? weight.replace(/kg$/i,'').trim() + 'kg' : '0kg',
    muscle, target,
    bookmarked: false
  };

  for (const day of days) gymData[day].push({ ...ex });
  saveData();
  cancelAddForm();
  document.getElementById('add-name').value = '';
  document.getElementById('add-weight').value = '';
  document.getElementById('add-target').value = '';
  showToast('Added ✓');
  renderGlossary();
  updateCounts();
}

function toggleDataMenu() {
  document.getElementById('data-corner').classList.toggle('open');
}

// Close menu when clicking outside
document.addEventListener('click', (e) => {
  const corner = document.getElementById('data-corner');
  if (corner && !corner.contains(e.target)) corner.classList.remove('open');
});

function exportData() {
  const json = JSON.stringify(gymData, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = window.URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.style.display = 'none';
  a.href = url;
  a.download = 'gymlog-' + new Date().toISOString().slice(0,10) + '.json';
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { window.URL.revokeObjectURL(url); document.body.removeChild(a); }, 100);
  showToast('Exported ✓');
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const data = JSON.parse(ev.target.result);
      // Basic validation — must have at least one known day key
      const validKeys = ['push','pull','legs','shoulders'];
      if (!validKeys.some(k => Array.isArray(data[k]))) throw new Error('Invalid format');
      gymData = data;
      saveData();
      updateCounts();
      showToast('Imported ✓');
    } catch(err) {
      showToast('Invalid file');
    }
    e.target.value = '';
  };
  reader.readAsText(file);
}

let compactMode = false;

function toggleCompact() {
  compactMode = !compactMode;
  const body = document.getElementById('workout-body');
  const btn  = document.getElementById('view-toggle');
  body.classList.toggle('compact', compactMode);
  btn.classList.toggle('active', compactMode);
  btn.textContent = compactMode ? '⊞' : '⊟';
}

function duplicateExercise(e, id, fromDay, toDay) {
  e.stopPropagation();
  // Check if already exists in target day (by name)
  const ex = gymData[fromDay].find(x => x.id === id);
  const exists = gymData[toDay].some(x => x.name.toLowerCase() === ex.name.toLowerCase());
  if (exists) { showToast('Already in ' + DAYS[toDay].label); return; }
  const clone = { ...ex, id: 'u' + Date.now(), bookmarked: false };
  gymData[toDay].push(clone);
  saveData();
  showToast('Added to ' + DAYS[toDay].label + ' ✓');
}

function toggleDayAddForm(dayKey) {
  const form = document.getElementById('day-add-form-' + dayKey);
  const btn  = document.getElementById('day-add-btn-' + dayKey);
  const isOpen = form.classList.contains('open');
  form.classList.toggle('open', !isOpen);
  btn.style.display = isOpen ? '' : 'none';
  if (!isOpen) document.getElementById('day-add-name-' + dayKey).focus();
}

function submitDayAdd(dayKey) {
  const name   = document.getElementById('day-add-name-' + dayKey).value.trim();
  const weight = document.getElementById('day-add-weight-' + dayKey).value.trim();
  const muscle = document.getElementById('day-add-muscle-' + dayKey).value;
  const target = document.getElementById('day-add-target-' + dayKey).value.trim() || null;

  if (!name) { showToast('Enter a name'); return; }

  const id = 'u' + Date.now();
  gymData[dayKey].push({ id, name, weight: weight ? weight.replace(/kg$/i,'').trim()+'kg' : '0kg', muscle, target, bookmarked: false });
  saveData();
  showToast('Added ✓');
  openDay(dayKey);
}

function goBack() {
  currentDay = null;
  const wp2 = document.getElementById('workout-page');
  const landing2 = document.getElementById('landing');
  wp2.classList.remove('page-enter');
  setTimeout(() => {
    wp2.style.display = 'none';
    landing2.style.display = 'flex';
    requestAnimationFrame(() => requestAnimationFrame(() => landing2.classList.remove('page-exit')));
  }, 220);
  updateCounts();
}
